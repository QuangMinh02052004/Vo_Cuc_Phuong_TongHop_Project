name: vo_cuc_phuong_app
description: "Võ Cúc Phương - Ứng dụng quản lý xe khách và hàng hóa"
publish_to: 'none'

version: 1.3.0+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Legacy WebView (giữ làm fallback cho Phase 2/3)
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0

  # HTTP + state
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.2

  # Local storage (JWT + cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  mobile_scanner: ^5.2.3

  # Native features
  permission_handler: ^11.3.1
  http: ^1.2.2

  # Local notifications (báo khi đặt vé / tạo đơn thành công)
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
